upstream corretorcenter_app {
    server 127.0.0.1:5180;
    keepalive 32;
}

server {
    listen 80;
    server_name __PANEL_DOMAIN__ __FORM_DOMAIN__ __GALLERY_DOMAIN__ __IMAGES_DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name __PANEL_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__PANEL_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PANEL_DOMAIN__/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://corretorcenter_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}

server {
    listen 443 ssl http2;
    server_name __FORM_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__PANEL_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PANEL_DOMAIN__/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://corretorcenter_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}

server {
    listen 443 ssl http2;
    server_name __GALLERY_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__PANEL_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PANEL_DOMAIN__/privkey.pem;

    location / {
        proxy_pass http://corretorcenter_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}

server {
    listen 443 ssl http2;
    server_name __IMAGES_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__PANEL_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PANEL_DOMAIN__/privkey.pem;

    location /files/ {
        proxy_pass http://corretorcenter_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        return 404;
    }
}
